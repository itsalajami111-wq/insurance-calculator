<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hoxton Wealth — Insurance Results</title>
  <style>
    :root{ --bg:#ffffff; --card:#F5F7FA; --text:#1F2937; --muted:#6B7280; --border:#E5E7EB; --primary:#0B3D3F; --shadow:0 10px 24px rgba(0,0,0,.07); }
    *{ box-sizing:border-box; }
    body{ margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; background:var(--bg); color:var(--text); }
    .wrap{ width:min(900px,92vw); margin:26px auto 60px; }
    .header{ background:var(--primary); color:#fff; border-radius:16px; padding:14px 16px; display:flex; align-items:center; gap:12px; box-shadow:var(--shadow); }
    .header img{ height:32px; width:auto; }
    .header .t1{ font-weight:800; }
    .header .t2{ font-size:12px; opacity:.9; }
    .card{ margin-top:14px; background:var(--card); border:1px solid var(--border); border-radius:16px; padding:16px; box-shadow:var(--shadow); }
    h1{ margin:6px 0 6px; color:var(--primary); font-size:24px; }
    p{ margin:0; color:var(--muted); line-height:1.5; }
    label{ display:flex; flex-direction:column; gap:6px; font-size:14px; font-weight:700; color:#374151; }
    input, select{ width:100%; border:1px solid var(--border); border-radius:10px; padding:10px 12px; font-size:15px; background:#fff; color:var(--text); outline:none; }
    .row{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .row2{ display:grid; grid-template-columns:160px 1fr; gap:12px; }
    .btn{ border:0; background:var(--primary); color:#fff; padding:12px 14px; border-radius:12px; font-size:15px; font-weight:800; cursor:pointer; width:100%; }
    .btn.ghost{ background:transparent; color:var(--primary); border:1px solid rgba(11,61,63,.35); }
    .error{ display:none; margin-top:12px; background:#FEF2F2; border:1px solid #FCA5A5; color:#991B1B; padding:10px 12px; border-radius:12px; font-size:14px; }
    .mini{ background:#fff; border:1px solid var(--border); border-radius:14px; padding:12px; margin-top:12px; }
    .kv{ display:flex; justify-content:space-between; gap:10px; padding:6px 0; border-bottom:1px dashed #E5E7EB; }
    .kv:last-child{ border-bottom:0; }
    .k{ color:var(--muted); font-size:13px; }
    .v{ font-weight:800; color:#111827; text-align:right; }
    @media(max-width:720px){ .row{ grid-template-columns:1fr; } .row2{ grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <img src="/hoxton-logo.png" alt="Hoxton Wealth">
      <div>
        <div class="t1">Hoxton Wealth</div>
        <div class="t2">Insurance Calculator — Lead Form</div>
      </div>
    </div>

    <div id="missing" class="card" style="display:none;">
      <h1>Results not found</h1>
      <p>Please complete the calculator first.</p>
      <div style="margin-top:14px;">
        <button class="btn" onclick="window.location.href='index.html'">Go to Calculator →</button>
      </div>
    </div>

    <div id="leadCard" class="card" style="display:none;">
      <h1>View Your Results</h1>
      <p>Enter your details to reveal your recommended cover needs.</p>

      <div class="mini" id="preview"></div>

      <div class="row" style="margin-top:14px;">
        <label>First Name *
          <input id="firstName" placeholder="First name" />
        </label>
        <label>Last Name *
          <input id="lastName" placeholder="Last name" />
        </label>
      </div>

      <div class="row" style="margin-top:12px;">
        <label style="grid-column:span 2;">Email Address *
          <input id="email" type="email" placeholder="name@example.com" />
        </label>
      </div>

      <div class="row" style="margin-top:12px;">
        <label>Country of Residence *
          <select id="country">
            <option value="">Select your country</option>
            <option>United Arab Emirates</option>
            <option>United Kingdom</option>
            <option>United States</option>
            <option>Canada</option>
            <option>Australia</option>
          </select>
        </label>
        <label>Currency
          <select id="currency" disabled>
            <option value="AED">AED (د.إ)</option>
          </select>
        </label>
      </div>

      <div class="row2" style="margin-top:12px;">
        <label>Phone Code *
          <select id="phoneCode">
            <option value="+971">United Arab Emirates (+971)</option>
            <option value="+44">United Kingdom (+44)</option>
            <option value="+1">United States (+1)</option>
            <option value="+1">Canada (+1)</option>
            <option value="+61">Australia (+61)</option>
          </select>
        </label>
        <label>Phone Number *
          <input id="phoneNumber" inputmode="numeric" placeholder="Numbers only" />
        </label>
      </div>

      <div id="err" class="error"></div>

      <div class="row" style="margin-top:14px;">
        <button class="btn" id="submitBtn">Submit & View Results →</button>
        <button class="btn ghost" onclick="window.location.href='index.html'">← Back</button>
      </div>
    </div>

    <div id="resultsCard" class="card" style="display:none;">
      <h1>Your Cover Needs</h1>
      <p>These figures are calculated from your inputs.</p>

      <div class="mini" id="resultsBox"></div>

      <div style="margin-top:14px;">
        <button class="btn ghost" onclick="window.location.href='index.html'">Start Again</button>
      </div>
    </div>
  </div>

<script>
  const money = (n) => new Intl.NumberFormat("en-GB",{ maximumFractionDigits:0 }).format(Number(n||0));

  const raw = localStorage.getItem("hoxton_insurance_results");
  let results = null;
  try { results = raw ? JSON.parse(raw) : null; } catch { results = null; }

  const missing = document.getElementById("missing");
  const leadCard = document.getElementById("leadCard");
  const resultsCard = document.getElementById("resultsCard");
  const preview = document.getElementById("preview");
  const resultsBox = document.getElementById("resultsBox");
  const err = document.getElementById("err");

  function showError(msg){ err.textContent = msg; err.style.display = msg ? "block" : "none"; }

  if (!results || typeof results.totalMonthlyExpenditure !== "number") {
    missing.style.display = "";
  } else {
    leadCard.style.display = "";
    preview.innerHTML = `
      <div class="kv"><div class="k">Total Monthly Expenditure</div><div class="v">${money(results.totalMonthlyExpenditure)}</div></div>
      <div class="kv"><div class="k">Additional Life Need</div><div class="v">${money(results.additionalLifeNeed)}</div></div>
      <div class="kv"><div class="k">Additional CIC Need</div><div class="v">${money(results.additionalCicNeed)}</div></div>
    `;
  }

  document.getElementById("submitBtn").addEventListener("click", async () => {
    showError("");

    const data = {
      firstName: document.getElementById("firstName").value.trim(),
      lastName: document.getElementById("lastName").value.trim(),
      email: document.getElementById("email").value.trim(),
      country: document.getElementById("country").value,
      currency: document.getElementById("currency").value || "AED",
      phoneCode: document.getElementById("phoneCode").value,
      phoneNumber: document.getElementById("phoneNumber").value.trim()
    };

    if (!data.firstName || !data.lastName) return showError("Please enter your first and last name.");
    if (!data.email.includes("@")) return showError("Please enter a valid email address.");
    if (!data.country) return showError("Please select your country.");
    if (!/^[0-9]{4,15}$/.test(data.phoneNumber)) return showError("Phone number must be 4–15 digits (numbers only).");

    try {
      const r = await fetch("/api/lead", {
        method: "POST",
        headers: { "Content-Type":"application/json" },
        body: JSON.stringify({ data, results })
      });

      const j = await r.json().catch(()=> ({}));
      if (!r.ok || !j.ok) return showError("Could not submit. Please try again.");

      leadCard.style.display = "none";
      resultsCard.style.display = "";
      resultsBox.innerHTML = `
        <div class="kv"><div class="k">Total Monthly Expenditure</div><div class="v">${money(results.totalMonthlyExpenditure)}</div></div>
        <div class="kv"><div class="k">Total Annual Expenditure</div><div class="v">${money(results.totalAnnualExpenditure)}</div></div>

        <div class="kv"><div class="k">Expenditure Cover (Life)</div><div class="v">${money(results.expenditureCover)}</div></div>
        <div class="kv"><div class="k">Child Care (Life)</div><div class="v">${money(results.childCare)}</div></div>
        <div class="kv"><div class="k">Total Life Need</div><div class="v">${money(results.totalLifeNeed)}</div></div>
        <div class="kv"><div class="k">Additional Life Need</div><div class="v">${money(results.additionalLifeNeed)}</div></div>

        <div class="kv"><div class="k">Expenditure Cover (CIC)</div><div class="v">${money(results.cicExpenditure)}</div></div>
        <div class="kv"><div class="k">Total CIC Need</div><div class="v">${money(results.totalCicNeed)}</div></div>
        <div class="kv"><div class="k">Additional CIC Need</div><div class="v">${money(results.additionalCicNeed)}</div></div>
      `;
    } catch (e) {
      console.error(e);
      showError("Could not submit. Please try again.");
    }
  });
</script>
</body>
</html>
